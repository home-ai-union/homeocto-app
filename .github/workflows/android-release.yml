name: Build and Release Android

on:
  push:
    tags:
      - 'v*'  # Auto-trigger on version tags like v0.2.7
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.7). Leave empty to create new tag from current commit.'
        required: false
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: true
      variant:
        description: 'Build variant'
        required: false
        type: choice
        options:
          - both
          - international
          - domestic
        default: 'both'
      flavor:
        description: 'Build flavor (app brand)'
        required: false
        type: choice
        options:
          - both
          - homeocto
          - bazhuayu
        default: 'both'

permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-android:
    runs-on: ubuntu-latest
    environment: production
    outputs:
      release_tag: ${{ steps.vars.outputs.release_tag }}
    strategy:
      matrix:
        include:
          - variant: international
            analytics_provider: firebase
            flavor: homeocto
          - variant: domestic
            analytics_provider: umeng
            flavor: bazhuayu
        # Filter based on workflow input
      fail-fast: false
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check variant filter
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.variant != 'both' && github.event.inputs.variant != matrix.variant }}
        run: |
          echo "Skipping ${{ matrix.variant }} variant (requested: ${{ github.event.inputs.variant }})"
          exit 0

      - name: Check flavor filter
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.flavor != '' && github.event.inputs.flavor != matrix.flavor }}
        run: |
          echo "Skipping ${{ matrix.flavor }} flavor (requested: ${{ github.event.inputs.flavor }})"
          exit 0

      - name: Setup release tag
        id: setup-tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            RELEASE_TAG="${{ github.event.inputs.tag }}"
            echo "Using provided tag: $RELEASE_TAG"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            RELEASE_TAG="${GITHUB_REF#refs/tags/}"
            echo "Using pushed tag: $RELEASE_TAG"
          else
            # Generate tag from version and date
            VERSION=$(grep '^version:' pubspec.yaml | head -1 | sed 's/version: //;s/+.*//')
            DATE=$(date -u +%y%m%d)
            SHORT_SHA=$(git rev-parse --short=6 HEAD)
            RELEASE_TAG="v${VERSION}-${DATE}-${SHORT_SHA}"
            echo "Generated tag: $RELEASE_TAG"
          fi
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

      - name: Create and push tag (if manual dispatch without tag)
        if: ${{ !startsWith(github.ref, 'refs/tags/') && !github.event.inputs.tag }}
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.setup-tag.outputs.release_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "Android Release $RELEASE_TAG"
          git push origin "$RELEASE_TAG"
          echo "Created and pushed tag: $RELEASE_TAG"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android command-line tools and SDK components (API 29)
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget
          ANDROID_SDK_ROOT=$HOME/Android/Sdk
          mkdir -p $ANDROID_SDK_ROOT
          # Download command-line tools (Linux)
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest
          mv /tmp/cmdline-tools/cmdline-tools/* $ANDROID_SDK_ROOT/cmdline-tools/latest/
          # Expose SDK paths for this and subsequent steps
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          # Accept licenses and install required components
          yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses || true
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-29" "build-tools;29.0.3"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Cache pub and Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
          key: ${{ runner.os }}-flutter-${{ matrix.variant }}-${{ hashFiles('**/pubspec.yaml') }}-${{ hashFiles('**/gradle-wrapper.properties') }}

      - name: Flutter pub get
        run: flutter pub get

      - name: Accept Android SDK licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Setup Android Signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Error: No signing configuration found. Release builds require signing keys."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks
          echo "KEYSTORE_PATH=$PWD/android/app/keystore.jks" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> $GITHUB_ENV
          echo "KEY_ALIAS=$KEY_ALIAS" >> $GITHUB_ENV
          echo "KEY_PASSWORD=$KEY_PASSWORD" >> $GITHUB_ENV
          echo "Android signing configured"
          
          # Print MD5 hashes for verification (safe - doesn't expose actual secrets)
          echo ""
          echo "========== Keystore Verification =========="
          echo "Keystore file MD5:"
          md5sum android/app/keystore.jks
          
          echo ""
          echo "Base64 decoded check:"
          echo "$KEYSTORE_BASE64" | base64 -d | md5sum
          
          echo ""
          echo "Credentials MD5 hashes:"
          echo -n "$KEYSTORE_PASSWORD" | md5sum | awk '{print "KEYSTORE_PASSWORD MD5: " $1}'
          echo -n "$KEY_ALIAS" | md5sum | awk '{print "KEY_ALIAS MD5: " $1}'
          echo -n "$KEY_PASSWORD" | md5sum | awk '{print "KEY_PASSWORD MD5: " $1}'
          echo "==========================================="
          echo ""
          echo "Compare these MD5 values with your local verification script output"

      - name: Set build args for international (Firebase)
        if: matrix.variant == 'international'
        run: |
          echo "PICOCLAW_FLUTTER_BUILD_ARGS=--dart-define=PICOCLAW_ANALYTICS_PROVIDER=firebase --dart-define=PICOCLAW_FIREBASE_APP_ID=${{ secrets.PICOCLAW_FIREBASE_APP_ID }} --dart-define=PICOCLAW_FIREBASE_API_KEY=${{ secrets.PICOCLAW_FIREBASE_API_KEY }} --dart-define=PICOCLAW_FIREBASE_PROJECT_ID=${{ secrets.PICOCLAW_FIREBASE_PROJECT_ID }} --dart-define=PICOCLAW_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.PICOCLAW_FIREBASE_MESSAGING_SENDER_ID }}" >> $GITHUB_ENV

      - name: Set build args for domestic (Umeng)
        if: matrix.variant == 'domestic'
        run: |
          echo "PICOCLAW_FLUTTER_BUILD_ARGS=--dart-define=PICOCLAW_ANALYTICS_PROVIDER=umeng --dart-define=PICOCLAW_UMENG_APP_KEY=${{ secrets.PICOCLAW_UMENG_APP_KEY }} --dart-define=PICOCLAW_UMENG_CHANNEL=${{ secrets.PICOCLAW_UMENG_CHANNEL }}" >> $GITHUB_ENV

      - name: Fetch/install Android core
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dart run tools/fetch_core_local.dart --repo home-ai-union/homeocto --tag latest --out-dir app/bin --platform android --arch arm64 --build-mode release --install-to-build  

      - name: Build Android App Bundle (AAB)
        run: flutter build appbundle --release --target-platform android-arm,android-arm64 --flavor ${{ matrix.flavor }} $PICOCLAW_FLUTTER_BUILD_ARGS

      - name: Build Android APK (release)
        run: flutter build apk --release --target-platform android-arm,android-arm64 --flavor ${{ matrix.flavor }} $PICOCLAW_FLUTTER_BUILD_ARGS

      - name: Verify APK Signature
        if: env.KEYSTORE_PATH != ''
        run: |
          echo "Verifying APK signature..."
          BUILD_TOOLS=$(ls -d $ANDROID_SDK_ROOT/build-tools/*/ | sort -V | tail -n 1)
          $BUILD_TOOLS/apksigner verify -v build/app/outputs/flutter-apk/app-release.apk || true
          echo "Signature verification completed"

      - name: Prepare release metadata
        id: vars
        run: |
          RELEASE_TAG="${{ steps.setup-tag.outputs.release_tag }}"
          now=$(date -u +%y%m%d)
          short=$(git rev-parse --short=6 HEAD)
          base_no_prefix="$now-$short"
          echo "Computed release base_no_prefix: $base_no_prefix"
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "RELEASE_BASE=$base_no_prefix" >> $GITHUB_ENV
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
          echo "VARIANT=${{ matrix.variant }}" >> $GITHUB_ENV

      - name: Collect and rename Android artifacts
        run: |
          set -e
          PKG_NAME=homeocto_app
          VARIANT=${VARIANT}
          FLAVOR=${{ matrix.flavor }}
          TAG=${RELEASE_BASE}
          if [ "$VARIANT" = "domestic" ]; then
            AAB_NAME=${PKG_NAME}-${TAG}-android-${FLAVOR}-arm_arm64.aab
            APK_NAME=${PKG_NAME}-${TAG}-android-${FLAVOR}-universal.apk
          else
            AAB_NAME=${PKG_NAME}-${TAG}-android-${FLAVOR}-international-arm_arm64.aab
            APK_NAME=${PKG_NAME}-${TAG}-android-${FLAVOR}-international-universal.apk
          fi
          rm -f "$AAB_NAME" "$APK_NAME" || true
          
          # AAB output path: build/app/outputs/bundle/{flavor}Release/app-{flavor}-release.aab
          AAB_PATH="build/app/outputs/bundle/${FLAVOR}Release/app-${FLAVOR}-release.aab"
          if [ -f "$AAB_PATH" ]; then
            cp "$AAB_PATH" "$AAB_NAME"
          else
            echo "AAB not found at $AAB_PATH"
            exit 1
          fi
          
          # APK output path: build/app/outputs/flutter-apk/app-{flavor}-release.apk
          APK_PATH="build/app/outputs/flutter-apk/app-${FLAVOR}-release.apk"
          if [ -f "$APK_PATH" ]; then
            cp "$APK_PATH" "$APK_NAME"
          else
            echo "APK not found at $APK_PATH"
            exit 1
          fi

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: homeocto_app-${{ env.RELEASE_BASE }}-android-${{ matrix.flavor }}-${{ env.VARIANT == 'domestic' && 'arm_arm64' || 'international-arm_arm64' }}.aab
          path: homeocto_app-${{ env.RELEASE_BASE }}-android-${{ matrix.flavor }}-${{ env.VARIANT == 'domestic' && 'arm_arm64' || 'international-arm_arm64' }}.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: homeocto_app-${{ env.RELEASE_BASE }}-android-${{ matrix.flavor }}-${{ env.VARIANT == 'domestic' && 'universal' || 'international-universal' }}.apk
          path: homeocto_app-${{ env.RELEASE_BASE }}-android-${{ matrix.flavor }}-${{ env.VARIANT == 'domestic' && 'universal' || 'international-universal' }}.apk

      - name: Cleanup signing keys
        if: always()
        run: |
          rm -f android/app/keystore.jks
          echo "Signing keys cleaned up"

  create-release:
    name: Create GitHub Release
    needs: build-android
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f -name "*" | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build-android.outputs.release_tag }}
          name: "Android Release ${{ needs.build-android.outputs.release_tag }}"
          body: |
            ## Android Release
            
            **Tag**: ${{ needs.build-android.outputs.release_tag }}
            **Commit**: ${{ github.sha }}
            **Build Time**: ${{ github.event.head_commit.timestamp || github.event.workflow_run.head_branch }}
            
            ### Included Variants
            - ✅ International / HomeOcto (Firebase Analytics)
            - ✅ Domestic/China / 八爪鱼 (Umeng Analytics)
            
            ### Files
            - APK files for direct installation
            - AAB files for Google Play Store
            
            ### Installation
            1. Download the APK for your region
            2. Enable "Install from Unknown Sources" in Android settings
            3. Install and enjoy!
          draft: false
          prerelease: ${{ github.event.inputs.prerelease || true }}
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
